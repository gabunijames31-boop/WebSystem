<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Cuprum:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Sofia+Sans+Extra+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@450" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Cuprum:ital,wght@0,400..700;1,400..700&family=Diplomata+SC&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Rubik+Wet+Paint&family=Sofia+Sans+Extra+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="main.css">

    <title>Sign in</title>
</head>
<body class="page">

<div class="container">
    <div class="form-container">

        <div class="form-blob">
            <img src="blob.svg" alt="blob" class="blob-image blob-image--2">
            <img src="blob.svg" alt="blob" class="blob-image blob-image--1">
            <img src="blob.svg" alt="blob" class="blob-image blob-image--3">
        </div>

        <div class="form-header" style="font-family: 'Bungee', sans-serif;">
            <p>Please enter your details</p>
            <h1>Sign in</h1>
        </div>


        <form class="form-box" id="loginForm">

            <div class="input-group" style="font-family: 'Cuprum', sans-serif;">
                <input type="email" id="email" class="input-field" required>
                <label for="email" class="floating-label">Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" class="input-field" required>
                <label for="password" class="floating-label">Password</label>

                <div class="eye-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2.062 12.348a1 1 0 0 1 0-.696
                        10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696
                        10.75 10.75 0 0 1-19.876 0"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </div>
            </div>

            <div class="input-group checkbox-group">
                <div class="form col-remember me">
                    <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                    <label for="remember-me-checkbox" style="color: black;">Remember me</label>
                </div>
                <div class="form col">
                    <a href="#" class="form-link" style="text-decoration: none;">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="form-btn form-btn--submit" style="font-family: 'Bungee', sans-serif;">
                Sign in
            </button>

        </form>

        <div class="form-divider">
            <p>or</p>
        </div>

        <div class="form-bottom">
            <div class="form-socials">
                <button type="button" class="form-btn form-btn--social">
                    <img src="google.jpg" class="btn-icon" alt="social icon">
                </button>
                <button type="button" class="form-btn form-btn--social">
                    <img src="Facebook – Wikipedie.jpg" class="btn-icon" alt="social icon">
                </button>
                <button type="button" class="form-btn form-btn--social">
                    <img src="apple.jpg" class="btn-icon" alt="social icon">
                </button>
            </div>

            <a href="sign-up.html" class="form-link" style="text-align: center; text-decoration: none; ">
                 <p style="color: black;">Dont have an account?</p>
            </a>

        </div>

    </div>
</div>
<script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Cuprum:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Sofia+Sans+Extra+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@450" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Cuprum:ital,wght@0,400..700;1,400..700&family=Diplomata+SC&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Rubik+Wet+Paint&family=Sofia+Sans+Extra+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <title>Sign up</title>
</head>
<body>

<div class="container" style="font-family: 'Bungee', sans-serif;">
    <div class="form-container">

        <div class="form-blob">
            <img src="blob.svg" alt="blob" class="blob-image blob-image--2">
            <img src="blob.svg" alt="blob" class="blob-image blob-image--1">
            <img src="blob.svg" alt="blob" class="blob-image blob-image--3">
        </div>

        <div class="form-header">
            <p >Create your account</p>
            <h1>Sign up first</h1>
        </div>

        <form class="form-box" action="main.html" method="get" style="font-family: 'Cuprum', sans-serif;">

            <div class="input-group">
                <input type="text" id="fullname" class="input-field" required>
                <label for="last name" class="floating-label">Last Name</label>
            </div>

            <div class="input-group">  
                <input type="first name" id="email" class="input-field" required>
                <label for="confirm" class="floating-label">First Name</label>
            </div>

            <div class="input-group">
                <input type="email address" id="password" class="input-field" required>
                <label for="confirm" class="floating-label">Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" id="confirm" class="input-field" required>
                <label for="confirm" class="floating-label">Password</label>
            </div>

            <button type="submit" class="form-btn form-btn--submit" style="font-family: 'Bungee', sans-serif;">
                Create Account
            </button>

        </form>

        <div class="form-divider">
            <p>or</p>
        </div>

        <p style="text-align: center;">
            <a href="main.html" class="form-link" style="text-align: center; text-decoration: none; color: black; font-family: 'Cuprum', sans-serif;">Already have an account?</a>
        </p>

    </div>
</div>

</body>
<script src="js/main.js"></script>
</html>
